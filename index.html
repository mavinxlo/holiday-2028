<!DOCTYPE html>
<html lang="zh-Hant-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2026-2028 我要快閃旅行! (手機優化版)</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --primary: #0056b3;
            --accent: #ff9800;
            --holiday-red: #ff4d4f;
            --saturday-blue: #e6f7ff;
            --sunday-pink: #fff1f0;
            --text-main: #262626;
            --white: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 10px; /* 手機端邊距縮小 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 15px;
            background: var(--white);
            padding: 15px;
            border-radius: 12px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 { margin: 0; color: var(--primary); font-size: 1.5rem; }
        .legend { margin-top: 8px; font-size: 0.8rem; display: flex; justify-content: center; gap: 10px; }
        .legend span { display: flex; align-items: center; gap: 3px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        /* 年份切換 - 手機適配 */
        .year-selector {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 15px;
        }

        .year-btn {
            flex: 1; /* 三個按鈕平分寬度 */
            padding: 12px 0;
            font-size: 1.1rem;
            cursor: pointer;
            border: 2px solid var(--primary);
            background: var(--white);
            color: var(--primary);
            border-radius: 10px;
            font-weight: bold;
            -webkit-tap-highlight-color: transparent;
        }

        .year-btn.active {
            background: var(--primary);
            color: var(--white);
        }

        /* 月份導覽 - 3行4列或2行6列 */
        .month-nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            width: 100%;
            margin-bottom: 15px;
        }

        .month-btn {
            padding: 10px 0;
            cursor: pointer;
            background: var(--white);
            border: 1px solid #ddd;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .month-btn.active {
            background: var(--accent);
            color: var(--white);
            border-color: var(--accent);
        }

        /* 日曆主卡片 - 寬度 100% */
        .calendar-card {
            background: var(--white);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .month-title {
            font-size: 1.8rem;
            color: var(--primary);
            text-align: center;
            margin: 0 0 15px 0;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .weekday-label {
            font-weight: bold;
            padding-bottom: 10px;
            color: #999;
            text-align: center;
            font-size: 0.8rem;
        }

        .day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
        }

        /* 顏色標記 */
        .day.sat { background-color: var(--saturday-blue); color: var(--primary); }
        .day.sun { background-color: var(--sunday-pink); color: var(--holiday-red); }
        .day.holiday { background-color: var(--holiday-red) !important; color: white !important; }

        .h-name {
            font-size: 0.5rem;
            transform: scale(0.85);
            line-height: 1;
            margin-top: 2px;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
        }

        /* 底部提醒 */
        .footer-note {
            font-size: 0.75rem;
            color: #888;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>✈️又準備去旅行啦!</h1>
    <div class="legend">
        <span><i class="dot" style="background:var(--holiday-red)"></i>公假</span>
        <span><i class="dot" style="background:var(--saturday-blue)"></i>週六</span>
        <span><i class="dot" style="background:var(--sunday-pink)"></i>週日</span>
    </div>
</div>

<div class="year-selector">
    <button class="year-btn active" onclick="setYear(2026)">2026</button>
    <button class="year-btn" onclick="setYear(2027)">2027</button>
    <button class="year-btn" onclick="setYear(2028)">2028</button>
</div>

<div class="month-nav" id="monthNav"></div>

<div class="calendar-card">
    <h2 class="month-title" id="displayMonth"></h2>
    <div class="days-grid" id="daysGrid"></div>
</div>

<div class="footer-note">
    * 數據基於曆法推算，具體以政府憲報公布為準。
</div>

<script>
    let currentYear = 2026;
    let currentMonth = 0;

    const holidays = {
        2026: { "01-01": "元旦", "02-17": "初一", "02-18": "初二", "02-19": "初三", "02-20": "初四補", "04-03": "受難節", "04-04": "受難翌", "04-06": "清明補", "05-01": "勞動節", "05-25": "佛誕", "06-19": "端午節", "07-01": "特區慶", "09-26": "中秋翌", "10-01": "國慶", "10-02": "國慶補", "10-19": "重陽節", "12-25": "聖誕節", "12-26": "周日補" },
        2027: { "01-01": "元旦", "02-06": "初一", "02-08": "初三", "02-09": "初四補", "03-26": "受難節", "03-27": "受難翌", "03-29": "復活節", "04-05": "清明節", "05-01": "勞動節", "05-13": "佛誕", "06-09": "端午節", "07-01": "特區慶", "09-16": "中秋翌", "10-01": "國慶", "10-08": "重陽節", "12-25": "聖誕節", "12-27": "聖誕補" },
        2028: { "01-01": "元旦", "01-26": "初一", "01-27": "初二", "01-28": "初三", "01-29": "初四補", "04-04": "清明節", "04-14": "受難節", "04-15": "受難翌", "04-17": "復活節", "05-01": "勞動節", "05-02": "佛誕", "05-29": "端午節", "07-01": "特區慶", "09-04": "中秋翌", "10-01": "國慶", "10-02": "國慶補", "10-26": "重陽節", "12-25": "聖誕節", "12-26": "周日補" }
    };

    function init() {
        const nav = document.getElementById('monthNav');
        for (let i = 0; i < 12; i++) {
            const btn = document.createElement('button');
            btn.className = 'month-btn';
            btn.innerText = (i + 1) + '月';
            btn.onclick = () => setMonth(i);
            nav.appendChild(btn);
        }
        updateView();
    }

    function setYear(year) {
        currentYear = year;
        document.querySelectorAll('.year-btn').forEach(b => b.classList.toggle('active', b.innerText == year));
        updateView();
    }

    function setMonth(m) {
        currentMonth = m;
        updateView();
    }

    function updateView() {
        document.querySelectorAll('.month-btn').forEach((b, i) => b.classList.toggle('active', i === currentMonth));
        document.getElementById('displayMonth').innerText = `${currentYear} / ${currentMonth + 1}`;
        const daysGrid = document.getElementById('daysGrid');
        daysGrid.innerHTML = '';
        
        ['日','一','二','三','四','五','六'].forEach((d, idx) => {
            const el = document.createElement('div');
            el.className = 'weekday-label';
            if(idx === 0) el.style.color = 'var(--holiday-red)';
            if(idx === 6) el.style.color = 'var(--primary)';
            el.innerText = d;
            daysGrid.appendChild(el);
        });

        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

        for (let i = 0; i < firstDay; i++) daysGrid.appendChild(document.createElement('div'));

        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const holidayKey = dateStr.substring(5);
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            
            const dateObj = new Date(currentYear, currentMonth, d);
            const weekDay = dateObj.getDay();
            if (weekDay === 0) dayEl.classList.add('sun');
            if (weekDay === 6) dayEl.classList.add('sat');
            
            dayEl.innerHTML = `<span>${d}</span>`;

            if (holidays[currentYear][holidayKey]) {
                dayEl.classList.add('holiday');
                const hSpan = document.createElement('span');
                hSpan.className = 'h-name';
                hSpan.innerText = holidays[currentYear][holidayKey];
                dayEl.appendChild(hSpan);
            }
            daysGrid.appendChild(dayEl);
        }
    }
    init();
</script>
</body>
</html>
